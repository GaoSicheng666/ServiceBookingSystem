<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>老年人服务预约系统</title>
  <link rel="icon" type="image/png" href="./assets/app-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <section class="auth-welcome" aria-labelledby="welcome-title">
      <div class="auth-welcome-content">
        <div class="welcome-brand">
          <img src="./assets/app-icon.png" alt="">
          <span>老年人服务预约系统</span>
        </div>
        <div class="welcome-copy">
          <p class="welcome-kicker">居家养老服务预约平台</p>
          <h1 id="welcome-title">安心预约，贴心服务</h1>
          <p>让每一次上门服务更清晰、更可靠，为长辈与家人带来从容安心的照护体验。</p>
        </div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="brand">
        <img class="brand-mark" src="./assets/app-icon.png" alt="">
        <div>
          <h1>老年人服务预约系统</h1>
          <p>老人、护工与管理后台</p>
        </div>
      </div>

      <section id="authPanel" class="panel auth-panel" aria-labelledby="auth-title"></section>
      <section id="sessionPanel" class="panel session-panel hidden" aria-labelledby="session-title"></section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p id="viewEyebrow" class="eyebrow">当前工作台</p>
          <h2 id="viewTitle">登录后开始</h2>
        </div>
        <div id="viewActions" class="topbar-actions"></div>
      </header>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
  </div>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
