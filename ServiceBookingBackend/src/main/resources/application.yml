server:
  port: 8080                     # 后端监听端口(Nginx 将来反代到这里)

spring:
  application:
    name: service-booking-backend

  datasource:
    # 数据库连接:全部从环境变量读取,不写死密码(安全要求)
    # 本机开发默认连本地库;服务器上通过环境变量覆盖
    url: ${SERVICE_DB_URL:jdbc:mysql://localhost:3306/service_booking_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SERVICE_DB_USER:root}
    password: ${SERVICE_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always               # 每次启动执行 schema.sql(内部用 IF NOT EXISTS,可重复执行)
      schema-locations: classpath:schema.sql
      encoding: UTF-8
      continue-on-error: false

# JWT 相关配置(密钥务必在生产用环境变量覆盖)
app:
  jwt:
    secret: ${SERVICE_JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-bytes-long}
    expiration-days: 7           # 令牌有效期(天)

logging:
  level:
    org.springframework.jdbc.core: info
